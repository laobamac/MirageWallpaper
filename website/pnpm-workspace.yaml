# pnpm 11 removed onlyBuiltDependencies and defaults strictDepBuilds to true,
# so unapproved install scripts fail with ERR_PNPM_IGNORED_BUILDS. Astro's build
# needs sharp (image optimization) and esbuild native binaries, so allow them.
allowBuilds:
  esbuild: true
  sharp: true

# Don't block `pnpm build` on the pre-run dependency-state check.
verifyDepsBeforeRun: false
