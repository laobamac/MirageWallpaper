name: Build and publish macOS App

on:
  push:
    branches:
      - main
    # Docs-only changes shouldn't rebuild the app. paths-ignore skips a push
    # only when *every* changed file matches, so any app source change still
    # triggers a build. Tag pushes (v*) ignore paths filters and always build.
    paths-ignore:
      - "website/**"
      - "docs/**"
      - ".github/workflows/deploy-website.yml"
      - "**/*.md"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

# Publishing must be serial: both architectures update the same signed feeds.
concurrency:
  group: mirage-release-publication
  cancel-in-progress: false

jobs:
  build:
    name: Build and package (${{ matrix.arch }})
    strategy:
      matrix:
        arch: [x86_64, arm64]
        include:
          - arch: x86_64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-15
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select newest Xcode
        shell: bash
        run: |
          newest="$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)"
          if [[ -z "$newest" ]]; then
            echo "::error::No Xcode found on the runner."
            exit 1
          fi
          sudo xcode-select -s "$newest/Contents/Developer"
          xcodebuild -version
          sdk="$(xcrun --sdk macosx --show-sdk-version)"
          echo "Selected macOS SDK: $sdk"
          major="${sdk%%.*}"
          if (( major < 26 )); then
            echo "::error::macOS 26 SDK is required to link the current system UI, but the newest available SDK is $sdk. Update the runner image or install Xcode 26."
            exit 1
          fi

      - name: Validate build secret
        shell: bash
        env:
          MIRAGE_STEAM_WEB_API_KEY: ${{ secrets.MIRAGE_STEAM_WEB_API_KEY }}
        run: |
          if [[ ! "$MIRAGE_STEAM_WEB_API_KEY" =~ ^[A-Fa-f0-9]{32}$ ]]; then
            echo "::error::Repository secret MIRAGE_STEAM_WEB_API_KEY is missing or invalid."
            exit 1
          fi

      - name: Install build dependencies
        shell: bash
        run: |
          brew install cmake ninja pkg-config llvm molten-vk vulkan-loader \
            vulkan-headers glslang glfw freetype fontconfig lz4 ffmpeg

      - name: Build renderers
        shell: bash
        run: |
          ./SceneRenderer/scripts/build.sh release
          ./WebRenderer/scripts/build.sh release
          ./VideoRenderer/scripts/build.sh release
          ./RmskinRenderer/scripts/build.sh release

      - name: Build app bundle
        shell: bash
        env:
          MIRAGE_ARCH: ${{ matrix.arch }}
          MIRAGE_STEAM_WEB_API_KEY: ${{ secrets.MIRAGE_STEAM_WEB_API_KEY }}
          MIRAGE_GIT_COMMIT: ${{ github.sha }}
        run: ./Mirage/scripts/build.sh Release

      - name: Verify app bundle
        shell: bash
        run: |
          app="Mirage/dist/Mirage.app"
          expected_build="$(git rev-list --count "$GITHUB_SHA")"
          test -d "$app"
          test -x "$app/Contents/Resources/Renderers/SceneWallpaper"
          test -x "$app/Contents/Resources/Renderers/WebWallpaper"
          test -x "$app/Contents/Resources/Renderers/VideoWallpaper"
          test -x "$app/Contents/Resources/Renderers/RmskinWallpaper"
          test -d "$app/Contents/Frameworks/Sparkle.framework"
          codesign --verify --deep --strict "$app"
          [[ "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$app/Contents/Info.plist")" == "$expected_build" ]]
          [[ "$(/usr/libexec/PlistBuddy -c 'Print :MirageGitCommit' "$app/Contents/Info.plist")" == "$GITHUB_SHA" ]]
          [[ "$(/usr/libexec/PlistBuddy -c 'Print :SUPublicEDKey' "$app/Contents/Info.plist")" == '/klI6Qh2rkydyEwm7lIAgZppwGitkU1YtQhoy75hkXg=' ]]
          [[ "$(/usr/libexec/PlistBuddy -c 'Print :SUFeedURL' "$app/Contents/Info.plist")" == *"appcast-${{ matrix.arch }}.xml" ]]
          built_in_key="$(/usr/libexec/PlistBuddy -c 'Print :MirageSteamWebAPIKey' "$app/Contents/Info.plist")"
          [[ "$built_in_key" =~ ^[A-Fa-f0-9]{32}$ ]]

      - name: Package app
        id: package
        shell: bash
        run: |
          set -euo pipefail
          build_number="$(git rev-list --count "$GITHUB_SHA")"
          short_commit="${GITHUB_SHA:0:12}"
          package="Mirage-${build_number}-${short_commit}-macOS-${{ matrix.arch }}.zip"
          ditto -c -k --sequesterRsrc --keepParent \
            "Mirage/dist/Mirage.app" "Mirage/dist/$package"
          shasum -a 256 "Mirage/dist/$package" > "Mirage/dist/$package.sha256"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"
          echo "package=$package" >> "$GITHUB_OUTPUT"

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: Mirage-${{ steps.package.outputs.build_number }}-macOS-${{ matrix.arch }}
          path: |
            Mirage/dist/${{ steps.package.outputs.package }}
            Mirage/dist/${{ steps.package.outputs.package }}.sha256
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

  publish:
    name: Publish ${{ github.ref_type == 'tag' && 'stable release' || 'pre-release' }} and update feeds
    needs: build
    if: github.event_name == 'push'
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download packages
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Resolve Sparkle publishing tools
        shell: bash
        run: |
          xcodebuild -resolvePackageDependencies \
            -project 'Mirage/Mirage Wallpaper.xcodeproj' \
            -scheme 'Mirage Wallpaper' \
            -derivedDataPath Mirage/build/DD

      - name: Create or replace the GitHub Release
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          build_number="$(git rev-list --count "$GITHUB_SHA")"
          short_commit="${GITHUB_SHA:0:12}"
          mkdir -p release-assets
          find artifacts -type f \( -name '*.zip' -o -name '*.sha256' \) -exec cp {} release-assets/ \;

          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            release_tag="$GITHUB_REF_NAME"
            release_title="Mirage ${GITHUB_REF_NAME}"
            prerelease_flag=()
          else
            release_tag="prerelease"
            release_title="Mirage Pre-release ${short_commit}"
            prerelease_flag=(--prerelease)
            if gh release view "$release_tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              gh release delete "$release_tag" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag
            fi
          fi

          notes_file="$RUNNER_TEMP/release-notes.md"
          {
            echo "Commit: \`${GITHUB_SHA}\`"
            echo
            git log -1 --format='%s%n%n%b' "$GITHUB_SHA"
          } > "$notes_file"

          gh release create "$release_tag" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$release_title" \
            --notes-file "$notes_file" \
            "${prerelease_flag[@]}"

          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"
          echo "channel=$([[ "$GITHUB_REF_TYPE" == "tag" ]] && printf stable || printf beta)" >> "$GITHUB_OUTPUT"

      - name: Ensure update-feed branch exists
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if ! gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/update-feeds" >/dev/null 2>&1; then
            gh api --method POST "repos/$GITHUB_REPOSITORY/git/refs" \
              -f ref='refs/heads/update-feeds' \
              -f sha="$GITHUB_SHA"
          fi

      - name: Check out update feeds
        uses: actions/checkout@v6
        with:
          ref: update-feeds
          path: update-feeds
          fetch-depth: 1

      - name: Generate signed architecture appcasts
        shell: bash
        env:
          MIRAGE_SPARKLE_PRIVATE_KEY: ${{ secrets.MIRAGE_SPARKLE_PRIVATE_KEY }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_CHANNEL: ${{ steps.release.outputs.channel }}
          BUILD_NUMBER: ${{ steps.release.outputs.build_number }}
        run: |
          set -euo pipefail
          [[ -n "$MIRAGE_SPARKLE_PRIVATE_KEY" ]] || {
            echo '::error::Repository secret MIRAGE_SPARKLE_PRIVATE_KEY is missing.'
            exit 1
          }
          tool='Mirage/build/DD/SourcePackages/artifacts/sparkle/Sparkle/bin/generate_appcast'
          test -x "$tool"

          for arch in x86_64 arm64; do
            archive="$(find artifacts -type f -name "*macOS-${arch}.zip" -print -quit)"
            test -n "$archive"
            appcast_dir="$RUNNER_TEMP/appcast-${arch}"
            mkdir -p "$appcast_dir"
            cp "$archive" "$appcast_dir/"
            if [[ -f "update-feeds/appcast-${arch}.xml" ]]; then
              cp "update-feeds/appcast-${arch}.xml" "$appcast_dir/appcast-${arch}.xml"
            fi
            archive_name="$(basename "$archive" .zip)"
            {
              echo "Commit: ${GITHUB_SHA}"
              echo "Channel: ${RELEASE_CHANNEL}"
              echo
              git log -1 --format='%s%n%n%b' "$GITHUB_SHA"
            } > "$appcast_dir/${archive_name}.txt"

            command=("$tool" --ed-key-file - --download-url-prefix "https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/" --link "https://github.com/${GITHUB_REPOSITORY}" --embed-release-notes --versions "$BUILD_NUMBER" --maximum-versions 6 --maximum-deltas 0)
            if [[ "$RELEASE_CHANNEL" == beta ]]; then
              command+=(--channel beta)
            fi
            command+=("$appcast_dir")
            printf '%s' "$MIRAGE_SPARKLE_PRIVATE_KEY" | "${command[@]}"
            cp "$appcast_dir/appcast-${arch}.xml" "update-feeds/appcast-${arch}.xml"
          done

      - name: Publish update feeds
        shell: bash
        run: |
          set -euo pipefail
          git -C update-feeds config user.name 'github-actions[bot]'
          git -C update-feeds config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git -C update-feeds add appcast-x86_64.xml appcast-arm64.xml
          if ! git -C update-feeds diff --cached --quiet; then
            git -C update-feeds commit -m "chore(update): publish ${{ steps.release.outputs.channel }} ${{ github.sha }}"
            git -C update-feeds push origin HEAD:update-feeds
          fi
